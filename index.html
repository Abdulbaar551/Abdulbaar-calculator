<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="calculator.css">
</head>
<body>
    
    <input id="output" type="text">

    <div>
        <button onclick="clearAll()" class="clear">CE</button>
        <button onclick="addInput('()')" class="operators">()</button>
        <button onclick="addInput('%')" class="operators">%</button>
        <button onclick="addInput('/')" class="operators">/</button>
    </div>

    <div>
        <button onclick="addInput(1)">1</button>
        <button onclick="addInput(2)">2</button>
        <button onclick="addInput(3)">3</button>
        <button onclick="addInput('*')" class="oprerators"> * </button>
    </div>

    <div>
        <button onclick="addInput(4)">4</button>
        <button onclick="addInput(5)">5</button>
        <button onclick="addInput(6)">6</button>
        <button onclick="addInput('-')" class="operators">-</button>
    </div>

    <div>
        <button onclick="addInput(7)">7</button>
        <button onclick="addInput(8)">8</button>
        <button onclick="addInput(9)">9</button>b
        <button onclick="addInput('+')" class="operators">+</button>
    </div>

    <div>
        <button onclick="addInput(0)">0</button>
        <button onclick="addInput('.')">.</button>
        <button onclick="addInput()">+/-</button>
        <button onclick="displayResult()" class="operator">=</button>
    </div>

    <script src="calculator.js"></script>
</body>
</html>
